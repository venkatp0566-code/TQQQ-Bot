name: Archive repo stats

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.STATS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and save stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          python track_stats.py

      - name: Push stats to private repo
        run: |
          git clone https://${{ secrets.STATS_TOKEN }}@github.com/venkatp0566-code/tqqq-bot-stats.git stats-repo
          cp repo_stats_history.csv stats-repo/repo_stats_history.csv 2>/dev/null || true
          cd stats-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add repo_stats_history.csv
          git commit -m "chore: weekly stats update $(date +'%Y-%m-%d')" || echo "No changes"
          git push