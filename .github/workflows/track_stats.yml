name: Archive repo stats

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.STATS_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and save stats
        env:
          GITHUB_TOKEN: ${{ secrets.STATS_TOKEN }}
        run: |
          python track_stats.py

      - name: Commit stats
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add repo_stats_history.csv
          git commit -m "chore: weekly stats update" || echo "No changes to commit"
          git push